<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Gas cylinder shape -->
  <rect x="180" y="160" width="152" height="260" rx="30" fill="white" opacity="0.95"/>
  <rect x="220" y="110" width="72" height="60" rx="10" fill="white" opacity="0.95"/>
  <ellipse cx="256" cy="160" rx="60" ry="12" fill="#e2e8f0"/>
  <!-- Letter D -->
  <text x="256" y="340" font-family="Arial, sans-serif" font-size="160" font-weight="bold" fill="#d97706" text-anchor="middle" dominant-baseline="central">D</text>
  <!-- Gas flame -->
  <ellipse cx="256" cy="80" rx="20" ry="30" fill="#fbbf24" opacity="0.8"/>
  <ellipse cx="256" cy="70" rx="10" ry="18" fill="#fef08a" opacity="0.9"/>
</svg>
