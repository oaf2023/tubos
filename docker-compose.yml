version: "3.9"

services:
  or-tools:
    build: ./or-tools-service
    container_name: gastrack-ortools
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: gastrack-neo4j
    ports:
      - "7687:7687"   # Bolt
      - "7474:7474"   # Browser UI
    environment:
      NEO4J_AUTH: neo4j/gastrack123
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p gastrack123 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Optional OSRM local routing service
  # Uncomment to use your own OSRM instance for road-following geometry.
  # Set OSRM_BASE_URL=http://osrm-local:5000 in .env
  # You must mount OSM data files in /data:
  #   docker compose run --rm osrm-local osrm-extract /data/region-latest.osm.pbf -p /opt/car.lua
  #   docker compose run --rm osrm-local osrm-partition /data/region-latest.osrm
  #   docker compose run --rm osrm-local osrm-customize /data/region-latest.osrm
  # Then start the service (it will auto-find the .osrm file in /data)
  # osrm-local:
  #   image: ghcr.io/project-osrm/osrm-backend:latest
  #   container_name: gastrack-osrm
  #   ports:
  #     - "5000:5000"
  #   volumes:
  #     - osrm_data:/data
  #   command: ["osrm-routed", "--algorithm", "mld", "/data/region-latest.osrm"]
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

volumes:
  neo4j_data:
  neo4j_logs:
