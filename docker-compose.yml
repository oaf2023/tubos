version: "3.9"

services:
  or-tools:
    build: ./or-tools-service
    container_name: gastrack-ortools
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: gastrack-neo4j
    ports:
      - "7687:7687"   # Bolt
      - "7474:7474"   # Browser UI
    environment:
      NEO4J_AUTH: neo4j/gastrack123
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p gastrack123 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  neo4j_data:
  neo4j_logs:
